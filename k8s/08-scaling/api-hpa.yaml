# Part 8 — HorizontalPodAutoscaler
#
# An HPA watches CPU (or memory) usage across the pods of a Deployment
# and automatically adjusts the replica count to keep usage near a target.
#
# Requirements:
#   - The target Deployment must have resource requests set (done in Part 7).
#   - The metrics-server must be running in the cluster.
#     minikube:       minikube addons enable metrics-server
#     Docker Desktop: enable in settings or install manually
#
# Fill in every ??? below, then apply:
#   kubectl apply -f k8s/08-scaling/api-hpa.yaml
#
# Monitor (wait ~60s for first metrics reading):
#   kubectl get hpa
#   kubectl get hpa -w

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ???           # Which Deployment should the HPA control?
  minReplicas: ???      # Minimum pods when the system is idle (try 1).
  maxReplicas: ???      # Maximum pods under heavy load (try 5).
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: ???   # Scale up when average CPU across all pods
                                    # exceeds this percentage (try 50).
