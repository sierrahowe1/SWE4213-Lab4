# Part 3 — Service
#
# A Service gives a Pod (or group of Pods) a stable network endpoint.
# Without a Service the only way to reach a Pod is via its internal cluster IP,
# which changes every time the Pod is replaced.
#
# Service types:
#   ClusterIP    — reachable only inside the cluster (default)
#   NodePort     — reachable at <node-ip>:<nodePort> (awkward on macOS/minikube)
#   LoadBalancer — gets an external IP on cloud providers; on minikube, run
#                  `minikube tunnel` to expose it at localhost
#
# Fill in every ??? below, then apply with:
#   kubectl apply -f k8s/03-service/api-service.yaml
#
# Verify (minikube tunnel must be running):
#   kubectl get services        # wait for EXTERNAL-IP to show 127.0.0.1
#   curl http://localhost:3000/health

apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api-pod
  type: LoadBalancer
  ports:
    - port: 3000 # Port the Service listens on — this is what you curl.
      targetPort: 3000 # Port on the Pod to forward traffic to.
