# Part 2 — Pod
#
# A Pod is the smallest deployable unit in Kubernetes.
# Fill in every ??? below, then apply with:
#   kubectl apply -f k8s/02-pod/api-pod.yaml
#
# Verify with:
#   kubectl get pods
#   kubectl logs api

apiVersion: v1
kind: Pod
metadata:
  name: api
  labels:
    app: api-pod

spec:
  containers:
    - name: api
      image: api:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 3000
      env:
        - name: DATABASE_URL
          value: "postgresql://postgres:secret@postgres:5432/notesdb"
        - name: PORT
          value: "3000"
