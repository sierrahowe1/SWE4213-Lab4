# Part 5 — Secret for the API
#
# The `data` field requires base64-encoded values (unlike stringData in
# postgres-secret.yaml). Encode your value before adding it here:
#
#   echo -n 'supersecret' | base64
#
# NOTE: base64 is encoding, not encryption. Anyone with kubectl access
# and permission to read Secrets can decode the value. The security
# comes from Kubernetes RBAC (controlling who can read Secrets), not
# from the encoding itself.
#
# Fill in the ??? below, then apply with:
#   kubectl apply -f k8s/05-secret/api-secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: api-secret
type: Opaque
data:
  API_KEY: ???   # base64-encoded value — run: echo -n 'supersecret' | base64
