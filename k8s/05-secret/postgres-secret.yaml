# Provided — Secret for the Postgres database.
#
# stringData lets you write plain-text values directly. Kubernetes converts
# them to base64 internally before storing. You can verify with:
#   kubectl get secret postgres-secret -o jsonpath='{.data.POSTGRES_USER}' | base64 --decode
#
# In contrast, the `data` field (used in api-secret.yaml) requires you to
# supply the base64-encoded value yourself.

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: secret
  POSTGRES_DB: notesdb
  DATABASE_URL: postgresql://postgres:secret@postgres:5432/notesdb